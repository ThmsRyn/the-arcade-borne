<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OSI Puzzle — Remettez les 7 couches OSI dans le bon ordre. Jeu educatif arcade.">
  <title>OSI PUZZLE — THE ARCADE BORNE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <main class="arcade-screen arcade-screen--narrow" role="main">

    <!-- HEADER -->
    <header class="site-header">
      <a href="../index.html" class="btn-back" data-i18n="back" aria-label="Retour au menu">&#x3C; RETOUR</a>
      <div class="site-header__controls">
        <a href="https://thmsryn.github.io/" class="header-link" target="_blank" rel="noopener" aria-label="Portfolio de Thomas Rayon">[PORTFOLIO]</a>
        <a href="https://github.com/ThmsRyn" class="header-link" target="_blank" rel="noopener" aria-label="GitHub de Thomas Rayon">[GITHUB]</a>
        <a href="https://www.linkedin.com/in/thomas-rayon-6a90001b5/" class="header-link" target="_blank" rel="noopener" aria-label="LinkedIn de Thomas Rayon">[LINKEDIN]</a>
        <button id="lang-toggle" class="btn-lang" aria-label="Changer de langue">EN</button>
      </div>
    </header>

    <!-- PUZZLE TYPE SELECTION -->
    <section id="type-screen" aria-labelledby="type-title">
      <div class="difficulty-selector">
        <h1 class="game-title mb-lg" data-i18n="game_osi_puzzle">OSI PUZZLE</h1>
        <p class="difficulty-selector__title" id="type-title" data-i18n="osi_select_type">CHOISIR LE PUZZLE</p>
        <div class="difficulty-buttons" style="flex-wrap:wrap; justify-content:center; gap:16px;">
          <button class="btn btn--primary btn--large" data-puzzle-type="osi">
            <span data-i18n="osi_type_osi">MODELE OSI</span><br>
            <small style="font-size:0.32rem; opacity:0.7;" data-i18n="osi_type_osi_sub">7 COUCHES OSI</small>
          </button>
          <button class="btn btn--primary btn--large" data-puzzle-type="tcpip">
            <span data-i18n="osi_type_tcpip">MODELE TCP/IP</span><br>
            <small style="font-size:0.32rem; opacity:0.7;" data-i18n="osi_type_tcpip_sub">4 COUCHES TCP/IP</small>
          </button>
          <button class="btn btn--primary btn--large" data-puzzle-type="handshake">
            <span data-i18n="osi_type_handshake">TCP HANDSHAKE</span><br>
            <small style="font-size:0.32rem; opacity:0.7;" data-i18n="osi_type_handshake_sub">THREE-WAY HANDSHAKE</small>
          </button>
          <button class="btn btn--primary btn--large" data-puzzle-type="dhcp">
            <span data-i18n="osi_type_dhcp">DHCP DORA</span><br>
            <small style="font-size:0.32rem; opacity:0.7;" data-i18n="osi_type_dhcp_sub">DISCOVER &gt; ACK</small>
          </button>
          <button class="btn btn--primary btn--large" data-puzzle-type="encap">
            <span data-i18n="osi_type_encap">ENCAPSULATION</span><br>
            <small style="font-size:0.32rem; opacity:0.7;" data-i18n="osi_type_encap_sub">DATA &gt; BITS</small>
          </button>
        </div>
      </div>
    </section>

    <!-- DIFFICULTY SELECTION -->
    <section id="difficulty-screen" style="display:none;" aria-labelledby="diff-title">
      <div class="difficulty-selector">
        <h1 class="game-title mb-lg" data-i18n="game_osi_puzzle">OSI PUZZLE</h1>

        <!-- How to Play — shown after type selection, collapsed by default on mobile -->
        <div class="htp-box" id="htp-box" aria-label="Comment jouer">
          <button class="htp-toggle" id="htp-toggle" aria-expanded="true" aria-controls="htp-content">
            <span data-i18n="htp_collapse">COMMENT JOUER</span>
            <span class="htp-toggle__arrow" id="htp-arrow" aria-hidden="true">&#x25BC;</span>
          </button>
          <div class="htp-content" id="htp-content">
            <p id="htp-text" class="htp-text"></p>
          </div>
        </div>

        <p class="difficulty-selector__title" data-i18n="select_difficulty">CHOISIR LA DIFFICULTE</p>
        <div class="difficulty-buttons" id="difficulty-buttons-container">
          <!-- Buttons injected by JS depending on puzzle type -->
        </div>
        <button class="btn btn--small text-grey mt-md" id="back-to-type-btn" style="border-color:#333;" aria-label="Retour au choix du puzzle">
          &lt; <span data-i18n="osi_select_type">CHOISIR LE PUZZLE</span>
        </button>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" style="display:none;" aria-label="Partie en cours">

      <div class="game-header">
        <h1 class="game-title" data-i18n="game_osi_puzzle">OSI PUZZLE</h1>
        <p id="osi-phase-label" style="font-size:0.35rem; color:var(--yellow); margin:0 0 8px; text-align:center;"></p>
        <div class="game-hud">
          <div class="hud-item">
            <span class="hud-item__label" data-i18n="hud_time">TEMPS</span>
            <span class="hud-item__value" id="hud-timer" aria-live="polite">00:00</span>
          </div>
          <div class="hud-item">
            <span class="hud-item__label" data-i18n="hud_errors">ERREURS</span>
            <span class="hud-item__value" id="hud-errors" aria-live="polite">0</span>
          </div>
        </div>
      </div>

      <div class="game-area">
        <div class="osi-layout">
          <div>
            <p class="port-match-col__title" data-i18n="osi_pieces_title">COUCHES DISPONIBLES</p>
            <div id="osi-pieces" role="list" aria-label="Pieces a placer"></div>
          </div>
          <div>
            <p class="port-match-col__title" id="osi-slots-title" data-i18n="osi_slots_title">MODELE OSI</p>
            <div id="osi-slots" role="list" aria-label="Emplacements du modele"></div>
          </div>
        </div>
      </div>

    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" style="display:none;" aria-label="Resultat">
      <div class="game-result">
        <h2 class="game-result__title game-result__title--win" id="result-title">VICTOIRE !</h2>
        <p class="game-result__score" id="result-score" aria-label="Score final">000000</p>
        <div class="game-result__actions">
          <button class="btn btn--primary btn--large" id="save-score-btn" data-i18n="save_score">ENREGISTRER LE SCORE</button>
          <button class="btn btn--magenta btn--large" id="play-again-btn" data-i18n="play_again">REJOUER</button>
          <a href="../index.html" class="btn btn--small text-grey" style="border-color:#333;" data-i18n="menu">MENU</a>
        </div>
      </div>
    </section>

    <!-- SCORE ENTRY SCREEN -->
    <section id="score-entry-screen" style="display:none;" aria-label="Entree du score">
      <div id="score-entry-container"></div>
    </section>

    <!-- POST-SAVE SCREEN -->
    <section id="post-save-screen" style="display:none;" aria-label="Score enregistre">
      <div class="game-result text-center">
        <p class="text-green mt-lg" style="font-size:0.6rem;">&#x2713; SCORE ENREGISTRE !</p>
        <div class="game-result__actions mt-lg">
          <button class="btn btn--magenta" id="capture-btn" data-i18n="capture_score">CAPTURE SCORE</button>
          <button class="btn btn--primary" id="post-save-play-again-btn" data-i18n="play_again">REJOUER</button>
          <a href="../index.html" class="btn btn--small text-grey" style="border-color:#333;" data-i18n="menu">MENU</a>
        </div>
      </div>
    </section>

  </main>

  <canvas id="ticket-canvas" style="display:none;" aria-hidden="true"></canvas>

  <script src="../js/i18n.js"></script>
  <script src="../js/scores.js"></script>
  <script src="../js/ticket.js"></script>
  <script src="../js/rewards.js"></script>
  <script src="../js/osi-puzzle.js"></script>

</body>
</html>
